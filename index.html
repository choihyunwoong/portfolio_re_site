<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KAPITAL | Architectural Archive</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* =========================================
       1. Design System & Variables
       ========================================= */
    :root {
      /* Primitives (원색) */
      --kapital-indigo: #1B2A49; 
      --kapital-mud: #5C4033;  
      --kapital-bone: #F5F2EB; 
      --kapital-accent: #8B0000; 

      /* Semantics (Original White Mode 기본값) */
      --bg-surface: var(--kapital-bone);
      --text-primary: var(--kapital-indigo);
      --text-secondary: var(--kapital-mud);
      --border-color: var(--kapital-indigo);

      /* Typography */
      --font-heading: 'Noto Serif JP', serif; /* 브랜드 헤리티지 강조용 명조체 */
      --font-body: 'Inter', sans-serif;       /* 가독성 중심 고딕체 */
    }

    /* Vintage Indigo Mode (테마 전환 시) */
    [data-theme="indigo"] {
      --bg-surface: var(--kapital-indigo);
      --text-primary: var(--kapital-bone);
      --text-secondary: #A0B0C0;
      --border-color: var(--kapital-bone);
    }

    /* =========================================
       2. Global Reset & Base
       ========================================= */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-surface);
      color: var(--text-primary);
      font-family: var(--font-body);
      transition: background-color 0.4s ease, color 0.4s ease;
      line-height: 1.6;
      overflow-x: hidden;
    }

    .font-heading {
      font-family: var(--font-heading);
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* =========================================
       3. Header & Navigation (건축적 그리드)
       ========================================= */
    .site-header {
      position: sticky;
      top: 0;
      width: 100%;
      border-bottom: 1px solid var(--border-color);
      background-color: var(--bg-surface);
      z-index: 100;
      transition: background-color 0.4s ease;
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 40px;
      height: 80px;
      max-width: 1440px;
      margin: 0 auto;
    }

    .logo {
      font-size: 28px;
      letter-spacing: 3px;
      font-weight: 700;
    }

    .nav-list {
      display: flex;
      list-style: none;
      gap: 40px;
      height: 100%;
      align-items: center;
    }

    .nav-item {
      height: 100%;
      display: flex;
      align-items: center;
    }

    .nav-item a {
      font-family: var(--font-heading);
      font-size: 16px;
      letter-spacing: 1px;
      position: relative;
      padding: 10px 0;
    }

    .btn-theme {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 8px 20px;
      cursor: pointer;
      border-radius: 50px;
      font-family: var(--font-body);
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .btn-theme:hover {
      background-color: var(--text-primary);
      color: var(--bg-surface);
    }

    /* =========================================
       4. Visual Mega Menu Dropdown
       ========================================= */
    .mega-menu {
      position: absolute;
      top: 80px;
      left: 0;
      width: 100%;
      background-color: var(--bg-surface);
      border-bottom: 1px solid var(--border-color);
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.5s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.3s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    .mega-menu.active {
      max-height: 400px;
      opacity: 1;
    }

    .mega-menu-content {
      display: flex;
      padding: 40px;
      gap: 60px;
      max-width: 1440px;
      margin: 0 auto;
    }

    .mega-image-wrapper {
      width: 300px;
      height: 200px;
      border: 1px solid var(--border-color);
      padding: 5px;
    }

    .mega-image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(20%);
    }

    .mega-text-wrapper {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .mega-text-wrapper h2 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .mega-text-wrapper p {
      color: var(--text-secondary);
      margin-bottom: 20px;
      font-size: 14px;
    }

    .sub-links {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sub-links li a {
      font-size: 15px;
      transition: color 0.3s ease;
    }

    .sub-links li a:hover {
      color: var(--kapital-accent);
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    /* =========================================
       5. Lookbook & Shoppable Hotspot Section
       ========================================= */
    .section-lookbook {
      padding: 80px 40px;
      text-align: center;
    }

    .section-title {
      margin-bottom: 60px;
      font-size: 36px;
      letter-spacing: 2px;
    }

    .lookbook-frame {
      position: relative;
      max-width: 900px;
      margin: 0 auto;
      border: 1px solid var(--border-color);
      padding: 10px;
    }

    .lookbook-img {
      width: 100%;
      display: block;
    }

    /* Hotspot Animation */
    .hotspot {
      position: absolute;
      cursor: pointer;
      z-index: 10;
    }

    .hotspot-dot {
      display: block;
      width: 18px;
      height: 18px;
      background-color: var(--kapital-accent);
      border-radius: 50%;
      border: 2px solid var(--kapital-bone);
      box-shadow: 0 0 0 0 rgba(139, 0, 0, 0.7);
      animation: pulse 2s infinite;
      transition: transform 0.3s ease;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(139, 0, 0, 0.7); }
      70% { box-shadow: 0 0 0 15px rgba(139, 0, 0, 0); }
      100% { box-shadow: 0 0 0 0 rgba(139, 0, 0, 0); }
    }

    .hotspot:hover .hotspot-dot {
      transform: scale(1.3);
      animation: none;
    }

    /* Hotspot Tooltip */
    .hotspot-tooltip {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background-color: var(--bg-surface);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      padding: 12px 16px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 13px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .hotspot-tooltip strong {
      font-family: var(--font-heading);
      margin-bottom: 4px;
    }

    .hotspot:hover .hotspot-tooltip {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    /* =========================================
       6. Tags Exploration Section
       ========================================= */
    .section-tags {
      padding: 60px 40px 100px;
      text-align: center;
      border-top: 1px solid var(--border-color);
      max-width: 1440px;
      margin: 0 auto;
    }

    .section-tags h3 {
      font-size: 20px;
      color: var(--text-secondary);
      margin-bottom: 30px;
    }

    .tag-container {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .tag-button {
      padding: 10px 24px;
      border: 1px solid var(--border-color);
      background: transparent;
      color: var(--text-primary);
      border-radius: 50px;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .tag-button:hover {
      background-color: var(--text-primary);
      color: var(--bg-surface);
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <h1 class="logo font-heading">KAPITAL</h1>
      
      <nav class="gnb">
        <ul class="nav-list" id="navList">
          <li class="nav-item" data-menu="journal"><a href="#journal">JOURNAL</a></li>
          <li class="nav-item" data-menu="shop"><a href="#shop">SHOP</a></li>
          <li class="nav-item" data-menu="story"><a href="#story">STORY</a></li>
          <li class="nav-item" data-menu="locations"><a href="#locations">LOCATIONS</a></li>
        </ul>
      </nav>

      <div class="header-actions">
        <button id="themeToggle" class="btn-theme">Vintage Indigo Mode</button>
      </div>
    </div>

    <div class="mega-menu" id="megaMenu">
      <div class="mega-menu-content">
        <div class="mega-image-wrapper">
          <img src="https://images.unsplash.com/photo-1574261869804-9ba0b4dd12b1?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Menu Visual" id="megaMenuImg">
        </div>
        <div class="mega-text-wrapper">
          <h2 class="font-heading" id="megaMenuTitle">CATEGORY</h2>
          <p id="megaMenuDesc">Category description goes here.</p>
          <ul class="sub-links" id="megaMenuLinks">
            </ul>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section id="journal" class="section-lookbook">
      <h2 class="section-title font-heading">2026 SS ISLA BONITA</h2>
      <div class="lookbook-frame">
        <img src="https://images.unsplash.com/photo-1550614000-4b95d415d315?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80" alt="Lookbook Page" class="lookbook-img">
        
        <div class="hotspot" style="top: 48%; left: 62%;">
          <span class="hotspot-dot"></span>
          <div class="hotspot-tooltip">
            <strong>Century Denim 5P Monkey Cisco</strong>
            <span style="color: var(--kapital-accent);">Shop the Look &rarr;</span>
          </div>
        </div>

        <div class="hotspot" style="top: 25%; left: 35%;">
          <span class="hotspot-dot"></span>
          <div class="hotspot-tooltip">
            <strong>Boro Patchwork Bandana Shirt</strong>
            <span style="color: var(--kapital-accent);">Shop the Look &rarr;</span>
          </div>
        </div>
      </div>
    </section>

    <section id="explore" class="section-tags">
      <h3 class="font-heading">Explore by Heritage</h3>
      <div class="tag-container">
        <button class="tag-button">#Boro</button>
        <button class="tag-button">#Smiley</button>
        <button class="tag-button">#Century_Denim</button>
        <button class="tag-button">#Indigo_Dyeing</button>
        <button class="tag-button">#Kojima_Craft</button>
      </div>
    </section>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      
      // --- 1. 다크모드 (Indigo Mode) 토글 로직 ---
      const themeToggleBtn = document.getElementById('themeToggle');
      const htmlEl = document.documentElement;

      themeToggleBtn.addEventListener('click', () => {
        const currentTheme = htmlEl.getAttribute('data-theme');
        if (currentTheme === 'indigo') {
          htmlEl.removeAttribute('data-theme');
          themeToggleBtn.textContent = 'Vintage Indigo Mode';
        } else {
          htmlEl.setAttribute('data-theme', 'indigo');
          themeToggleBtn.textContent = 'Original White Mode';
        }
      });

      // --- 2. 시각적 메가 메뉴 (Hover Interaction) 로직 ---
      const navItems = document.querySelectorAll('.nav-item');
      const megaMenu = document.getElementById('megaMenu');
      const megaMenuTitle = document.getElementById('megaMenuTitle');
      const megaMenuDesc = document.getElementById('megaMenuDesc');
      const megaMenuLinks = document.getElementById('megaMenuLinks');
      const megaMenuImg = document.getElementById('megaMenuImg');
      
      // 메뉴별 동적 데이터 (이미지, 제목, 설명, 서브카테고리)
      const menuData = {
        journal: {
          title: 'JOURNAL',
          desc: '시즌 스토리텔링 및 브랜드의 독보적인 비주얼 아카이브.',
          img: 'https://images.unsplash.com/photo-1492447166138-50c3889f1b1e?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80',
          links: ['2026 SS ISLA BONITA', 'Kountry Fall/Winter', 'Denim Bauhaus Archive']
        },
        shop: {
          title: 'SHOP',
          desc: '의류부터 액세서리까지, 구매를 위한 직관적인 3-Click 탐색.',
          img: 'https://images.unsplash.com/photo-1542272201-b1ca555f8505?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80',
          links: ['Denim Pants', 'Boro Jackets', 'Knitwear', 'Accessories & Bandanas']
        },
        story: {
          title: 'STORY',
          desc: 'Kojima의 장인 정신, 천연 염색 기법과 보로 직물의 역사.',
          img: 'https://images.unsplash.com/photo-1558024920-b41e1887dc32?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80',
          links: ['Century Denim', 'The Indigo Dyeing Process', 'The Kojima Legacy']
        },
        locations: {
          title: 'LOCATIONS',
          desc: '전 세계 KAPITAL 플래그십 스토어 및 오프라인 매장 안내.',
          img: 'https://images.unsplash.com/photo-1582005450386-52cc85822d11?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80',
          links: ['Kyoto Store', 'Tokyo Shibuya', 'Global Stockists']
        }
      };

      let hideTimeout;

      // 네비게이션 아이템에 마우스를 올렸을 때
      navItems.forEach(item => {
        item.addEventListener('mouseenter', (e) => {
          clearTimeout(hideTimeout);
          const category = e.target.getAttribute('data-menu');
          const data = menuData[category];

          if(data) {
            // 데이터 주입
            megaMenuTitle.textContent = data.title;
            megaMenuDesc.textContent = data.desc;
            megaMenuImg.src = data.img;
            
            // 서브 링크 생성
            megaMenuLinks.innerHTML = '';
            data.links.forEach(linkText => {
              const li = document.createElement('li');
              li.innerHTML = `<a href="#${category}">${linkText}</a>`;
              megaMenuLinks.appendChild(li);
            });

            // 메뉴 열기
            megaMenu.classList.add('active');
          }
        });

        // 네비게이션 아이템에서 마우스가 벗어났을 때 (딜레이 적용)
        item.addEventListener('mouseleave', () => {
          hideTimeout = setTimeout(() => {
            megaMenu.classList.remove('active');
          }, 300); // 0.3초 딜레이로 마우스 이동 시 부드러운 사용성 제공
        });
      });

      // 메가메뉴 영역 자체에 마우스가 있을 때는 닫히지 않도록 유지
      megaMenu.addEventListener('mouseenter', () => {
        clearTimeout(hideTimeout);
      });

      // 메가메뉴 영역에서 완전히 벗어나면 닫기
      megaMenu.addEventListener('mouseleave', () => {
        megaMenu.classList.remove('active');
      });

    });
  </script>
</body>
</html>
