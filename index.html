<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KAPITAL | The Craftsmanship of Denim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1 class="logo">KAPITAL</h1>
      <nav class="gnb">
        <ul class="nav-list" id="navList">
          <li class="nav-item" data-menu="journal"><a href="#journal">JOURNAL</a></li>
          <li class="nav-item" data-menu="shop"><a href="#shop">SHOP</a></li>
          <li class="nav-item" data-menu="story"><a href="#story">STORY</a></li>
          <li class="nav-item" data-menu="locations"><a href="#locations">LOCATIONS</a></li>
        </ul>
      </nav>
      <div class="header-actions">
        <button id="themeToggle" class="btn-theme">Toggle Theme</button>
      </div>
    </div>

    <div class="mega-menu" id="megaMenu">
      <div class="mega-menu-content">
        <div class="mega-image-wrapper">
          <img src="https://via.placeholder.com/400x250/1B2A49/F5F2EB?text=Visual+Texture" alt="Menu Visual" id="megaMenuImg">
        </div>
        <div class="mega-text-wrapper">
          <h2 class="font-heading" id="megaMenuTitle">CATEGORY</h2>
          <p id="megaMenuDesc">Category description goes here.</p>
          <ul class="sub-links" id="megaMenuLinks">
            </ul>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section id="journal" class="section-lookbook">
      <h2 class="section-title font-heading">2026 SS ISLA BONITA</h2>
      <div class="lookbook-frame">
        <img src="https://via.placeholder.com/800x600/5C4033/F5F2EB?text=Lookbook+Spread" alt="Lookbook Page" class="lookbook-img">
        <div class="hotspot" style="top: 45%; left: 60%;">
          <span class="hotspot-dot"></span>
          <div class="hotspot-tooltip">
            <strong>Century Denim 5P Monkey Cisco</strong>
            <span>Shop the Look &rarr;</span>
          </div>
        </div>
      </div>
    </section>

    <section id="explore" class="section-tags">
      <h3 class="font-heading">Explore by Heritage</h3>
      <div class="tag-container">
        <button class="tag-button">#Boro</button>
        <button class="tag-button">#Smiley</button>
        <button class="tag-button">#Century_Denim</button>
        <button class="tag-button">#Indigo_Dyeing</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
